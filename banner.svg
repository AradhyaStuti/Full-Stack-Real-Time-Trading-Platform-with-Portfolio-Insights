<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2d4d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#387ed1" />
      <stop offset="100%" style="stop-color:#5ca0f2" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50" />
      <stop offset="100%" style="stop-color:#2e7d32" />
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f44336" />
      <stop offset="100%" style="stop-color:#c62828" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="12"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#5ca0f2" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Stock chart line (background decoration) -->
  <polyline fill="none" stroke="#4caf50" stroke-width="2" opacity="0.15"
    points="0,300 60,280 120,290 180,250 240,260 300,220 360,240 420,200 480,210 540,180 600,190 660,160 720,170 740,150 800,165 860,140 920,155 980,130 1040,145 1100,120 1160,135 1200,110"/>
  <polyline fill="none" stroke="#f44336" stroke-width="2" opacity="0.1"
    points="0,320 60,330 120,310 180,340 240,325 300,350 360,330 420,345 480,335 540,355 600,340 660,360 720,350 740,365 800,355 860,370 920,360 980,375 1040,365 1100,380 1160,370 1200,360"/>

  <!-- Candlestick decorations -->
  <g opacity="0.12">
    <!-- Green candles -->
    <rect x="850" y="140" width="8" height="40" fill="#4caf50" rx="1"/>
    <line x1="854" y1="130" x2="854" y2="190" stroke="#4caf50" stroke-width="1.5"/>
    <rect x="875" y="120" width="8" height="50" fill="#4caf50" rx="1"/>
    <line x1="879" y1="110" x2="879" y2="180" stroke="#4caf50" stroke-width="1.5"/>
    <rect x="900" y="100" width="8" height="35" fill="#4caf50" rx="1"/>
    <line x1="904" y1="90" x2="904" y2="145" stroke="#4caf50" stroke-width="1.5"/>
    <!-- Red candles -->
    <rect x="925" y="110" width="8" height="45" fill="#f44336" rx="1"/>
    <line x1="929" y1="100" x2="929" y2="165" stroke="#f44336" stroke-width="1.5"/>
    <rect x="950" y="130" width="8" height="30" fill="#f44336" rx="1"/>
    <line x1="954" y1="120" x2="954" y2="170" stroke="#f44336" stroke-width="1.5"/>
    <!-- Green candles -->
    <rect x="975" y="105" width="8" height="40" fill="#4caf50" rx="1"/>
    <line x1="979" y1="95" x2="979" y2="155" stroke="#4caf50" stroke-width="1.5"/>
    <rect x="1000" y="85" width="8" height="45" fill="#4caf50" rx="1"/>
    <line x1="1004" y1="75" x2="1004" y2="140" stroke="#4caf50" stroke-width="1.5"/>
  </g>

  <!-- Logo area -->
  <g transform="translate(80, 70)">
    <!-- Chart icon -->
    <rect x="0" y="30" width="10" height="25" fill="url(#accent)" rx="2" opacity="0.9"/>
    <rect x="14" y="18" width="10" height="37" fill="url(#accent)" rx="2" opacity="0.9"/>
    <rect x="28" y="8" width="10" height="47" fill="url(#accent)" rx="2" opacity="0.9"/>
    <polyline fill="none" stroke="#5ca0f2" stroke-width="2.5" points="5,28 19,16 33,6 45,0" opacity="0.8"/>
    <circle cx="45" cy="0" r="3" fill="#5ca0f2" opacity="0.8"/>
  </g>

  <!-- Title -->
  <text x="145" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="1">
    Broking.Ltd
  </text>

  <!-- Subtitle -->
  <text x="80" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#8eafd4" font-weight="300">
    Full Stack Real-Time Trading Platform with Portfolio Insights
  </text>

  <!-- Divider -->
  <rect x="80" y="175" width="120" height="3" fill="url(#accent)" rx="2"/>

  <!-- Description -->
  <text x="80" y="215" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#7a9bc5" font-weight="300">
    Real-time stock trading dashboard with live WebSocket price streaming,
  </text>
  <text x="80" y="237" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#7a9bc5" font-weight="300">
    secure authentication, portfolio analytics, and 39 integration tests.
  </text>

  <!-- Tech stack pills -->
  <g transform="translate(80, 270)">
    <!-- React -->
    <rect x="0" y="0" width="72" height="28" rx="14" fill="#61DAFB" opacity="0.15"/>
    <text x="36" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#61DAFB" text-anchor="middle" font-weight="600">React</text>

    <!-- Node.js -->
    <rect x="82" y="0" width="76" height="28" rx="14" fill="#339933" opacity="0.15"/>
    <text x="120" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#68c968" text-anchor="middle" font-weight="600">Node.js</text>

    <!-- Express -->
    <rect x="168" y="0" width="80" height="28" rx="14" fill="#ffffff" opacity="0.08"/>
    <text x="208" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="middle" font-weight="600">Express</text>

    <!-- MongoDB -->
    <rect x="258" y="0" width="86" height="28" rx="14" fill="#47A248" opacity="0.15"/>
    <text x="301" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6fcf6f" text-anchor="middle" font-weight="600">MongoDB</text>

    <!-- Socket.io -->
    <rect x="354" y="0" width="84" height="28" rx="14" fill="#ffffff" opacity="0.08"/>
    <text x="396" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="middle" font-weight="600">Socket.io</text>

    <!-- Chart.js -->
    <rect x="448" y="0" width="76" height="28" rx="14" fill="#FF6384" opacity="0.15"/>
    <text x="486" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#FF6384" text-anchor="middle" font-weight="600">Chart.js</text>

    <!-- Jest -->
    <rect x="534" y="0" width="62" height="28" rx="14" fill="#C21325" opacity="0.15"/>
    <text x="565" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#f25c5c" text-anchor="middle" font-weight="600">Jest</text>
  </g>

  <!-- Stats boxes -->
  <g transform="translate(80, 330)">
    <rect x="0" y="0" width="100" height="42" rx="6" fill="#ffffff" opacity="0.04"/>
    <text x="50" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5ca0f2" text-anchor="middle" font-weight="700">39</text>
    <text x="50" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6a8bb5" text-anchor="middle">Tests Passing</text>

    <rect x="115" y="0" width="100" height="42" rx="6" fill="#ffffff" opacity="0.04"/>
    <text x="165" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4caf50" text-anchor="middle" font-weight="700">15</text>
    <text x="165" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6a8bb5" text-anchor="middle">Live Stocks</text>

    <rect x="230" y="0" width="100" height="42" rx="6" fill="#ffffff" opacity="0.04"/>
    <text x="280" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ff9800" text-anchor="middle" font-weight="700">6</text>
    <text x="280" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6a8bb5" text-anchor="middle">API Routes</text>

    <rect x="345" y="0" width="100" height="42" rx="6" fill="#ffffff" opacity="0.04"/>
    <text x="395" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#e040fb" text-anchor="middle" font-weight="700">3</text>
    <text x="395" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6a8bb5" text-anchor="middle">React Apps</text>
  </g>

  <!-- Live indicator -->
  <g transform="translate(1050, 360)">
    <circle cx="8" cy="10" r="5" fill="#4caf50" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="20" y="15" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#4caf50" font-weight="600">LIVE</text>
    <text x="55" y="15" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#6a8bb5" font-weight="300">WebSocket</text>
  </g>
</svg>
